<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不羡鱼 · Bù Xiàn Yú</title>

<style>
body {
  background: #0a0a0a;
  color: #f5f5f5;
  font-family: Arial, sans-serif;
}

button {
  cursor: pointer;
}
</style>
</head>

<body>

<h1>不羡鱼 Cocktail Menu</h1>

<input id="comment-input" placeholder="写评论..." />
<button onclick="submitComment('demo')">提交评论</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "REPLACE",
  authDomain: "REPLACE",
  databaseURL: "REPLACE",
  projectId: "REPLACE"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const ADMIN_UID = "PMSCdqiHcAZ57CZQKwrTeBSmLKq2";

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user && user.uid === ADMIN_UID) {
    showAdminButton();
  }
});

window.login = function () {
  const email = prompt("Admin Email:");
  const password = prompt("Password:");

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("登录成功"))
    .catch((e) => alert("失败：" + e.message));
};

window.submitComment = function (key) {
  if (!currentUser) {
    alert("请先登录");
    return;
  }

  const input = document.getElementById("comment-input");
  const text = input.value.trim();

  if (!text) return;

  push(ref(db, "comments/" + key), {
    text,
    uid: currentUser.uid,
    time: Date.now()
  });

  input.value = "";
};

window.deleteComment = function (key, id) {
  if (!currentUser || currentUser.uid !== ADMIN_UID) {
    alert("无权限");
    return;
  }

  remove(ref(db, "comments/" + key + "/" + id));
};

function showAdminButton() {
  if (document.getElementById("admin-btn")) return;

  const btn = document.createElement("button");
  btn.id = "admin-btn";
  btn.innerText = "ADMIN";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.right = "20px";

  btn.onclick = () => alert("你是管理员");

  document.body.appendChild(btn);
}
</script>

</body>
</html>
